<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Edimax BR-6428ns v3 – تحكم كامل</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
    body { background: #eef2f9; padding: 16px; }
    .container { max-width: 1000px; margin: auto; }
    .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    h2, h3 { margin-bottom: 14px; display: flex; align-items: center; gap: 8px; font-size: 17px; }
    .flex-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    label { display: block; margin-bottom: 5px; font-size: 13px; color: #555; }
    input, select { padding: 11px 16px; border-radius: 60px; border: 1px solid #ccc; font-size: 14px; background: #fff; width: 100%; }
    button { padding: 11px 20px; border-radius: 60px; background: #1e466e; color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; white-space: nowrap; font-size: 14px; }
    button:active { background: #0f2c48; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
    th, td { padding: 10px 6px; text-align: right; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; font-weight: 600; }
    .mac { font-family: monospace; background: #f1f5f9; padding: 3px 7px; border-radius: 16px; font-size: 12px; }
    .on { color: #16a34a; font-weight: bold; }
    .off { color: #dc2626; font-weight: bold; }
    .toast { position: fixed; bottom: 16px; left: 16px; right: 16px; background: #1f2937; color: white; padding: 12px 20px; border-radius: 60px; display: none; z-index: 1000; font-size: 14px; text-align: center; }
    .msg { padding: 10px 14px; border-radius: 16px; margin-top: 10px; font-size: 13px; }
    .err { background: #fee2e2; color: #b91c1c; }
    .ok  { background: #dcfce7; color: #15803d; }
    .inf { background: #dbeafe; color: #1e40af; }
    hr { margin: 16px 0; border: none; border-top: 1px solid #e2e8f0; }
    .mac-item { background: #f8fafc; margin: 6px 0; padding: 10px 14px; border-radius: 30px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .mac-item button { padding: 6px 14px; font-size: 12px; background: #dc2626; }
    .field { flex: 1; min-width: 160px; }
    @media (max-width: 600px) { .flex-row { flex-direction: column; } button { width: 100%; } }
    .status-badge { font-size: 12px; margin-right: 8px; }
  </style>
</head>
<body>
<div class="container">

  <!-- الاتصال -->
  <div class="card">
    <h2>🌐 Edimax BR-6428ns v3 — لوحة تحكم متقدمة</h2>
    <div class="flex-row">
      <div class="field">
        <label>IP الراوتر</label>
        <input type="text" id="rip" value="192.168.1.185" dir="ltr">
      </div>
      <div class="field">
        <label>اسم المستخدم</label>
        <input type="text" id="ruser" value="admin" dir="ltr">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="rpass">
      </div>
    </div>
    <div class="flex-row" style="margin-top:12px;">
      <button onclick="testConnection()">🔌 اختبار الاتصال</button>
      <button onclick="fullLoginAndFetch()">🚀 دخول وجلب الأجهزة</button>
    </div>
    <div id="conn-status"></div>
  </div>

  <!-- الأجهزة المتصلة -->
  <div class="card">
    <h3>📱 الأجهزة المتصلة</h3>
    <button onclick="fetchDevices()" style="margin-bottom:10px;">🔄 تحديث</button>
    <div id="dev-list"><span style="color:#888;font-size:13px;">لم يتم تسجيل الدخول بعد</span></div>
  </div>

  <!-- حظر MAC -->
  <div class="card">
    <h3>⛔ حظر جهاز عبر MAC</h3>
    <div class="flex-row">
      <div class="field">
        <label>عنوان MAC</label>
        <input type="text" id="blk-mac" placeholder="AA:BB:CC:DD:EE:FF" dir="ltr">
      </div>
      <div class="field">
        <label>وصف (اختياري)</label>
        <input type="text" id="blk-desc" placeholder="مثلاً: هاتف أحمد">
      </div>
      <button onclick="blockMacAddress()">🚫 حظر</button>
    </div>
    <div id="blacklist"></div>
  </div>

  <!-- إعدادات متقدمة -->
  <div class="card">
    <h3>⚙️ إعدادات متقدمة</h3>
    <div class="flex-row">
      <div class="field">
        <label>🔐 كلمة مرور WiFi الجديدة</label>
        <input type="password" id="wifipwd" placeholder="8 أحرف على الأقل">
      </div>
      <button onclick="changeWifiPassword()">تغيير</button>
    </div>
    <hr>
    <div class="flex-row">
      <div class="field">
        <label>🙈 إظهار / إخفاء الشبكة</label>
        <select id="ssid-vis">
          <option value="0">مرئية</option>
          <option value="1">مخفية</option>
        </select>
      </div>
      <button onclick="setSsidVisibility()">تطبيق</button>
    </div>
    <hr>
    <div class="flex-row">
      <div class="field">
        <label>👤 اسم مستخدم الراوتر الجديد</label>
        <input type="text" id="newuser" dir="ltr" placeholder="admin جديد">
      </div>
      <button onclick="changeAdminUser()">تغيير</button>
    </div>
    <hr>
    <label style="font-weight:600;margin-bottom:10px;display:block;">⚡ تحديد سرعة جهاز (QoS)</label>
    <div class="flex-row">
      <div class="field">
        <label>MAC الجهاز</label>
        <input type="text" id="qmac" placeholder="AA:BB:CC:DD:EE:FF" dir="ltr">
      </div>
      <div class="field">
        <label>تحميل Mbps</label>
        <input type="number" id="qdl" placeholder="0 = بلا حد">
      </div>
      <div class="field">
        <label>رفع Mbps</label>
        <input type="number" id="qul" placeholder="0 = بلا حد">
      </div>
      <button onclick="setQosRate()">تطبيق</button>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
  // --------------------------------------------------------------
  // دوال مساعدة - استخدام XMLHttpRequest لتجنب CORS preflight
  // --------------------------------------------------------------
  function getRouterUrl() {
    let ip = document.getElementById('rip').value.trim();
    if (!ip) ip = '192.168.1.185';
    return 'http://' + ip;
  }

  function getAuthHeader() {
    const user = document.getElementById('ruser').value.trim();
    const pass = document.getElementById('rpass').value;
    return 'Basic ' + btoa(user + ':' + pass);
  }

  // طلب GET عبر XHR (لا يرسل OPTIONS)
  function xhrGet(path, timeout = 8000) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      const fullUrl = getRouterUrl() + path;
      xhr.open('GET', fullUrl, true);
      xhr.withCredentials = true;   // مهم لإرسال الكوكيز / المصادقة
      xhr.setRequestHeader('Authorization', getAuthHeader());
      xhr.timeout = timeout;
      xhr.onload = function() {
        if (xhr.status === 401) reject(new Error('اسم المستخدم أو كلمة المرور خاطئة (401)'));
        else if (xhr.status >= 200 && xhr.status < 300) resolve(xhr.responseText);
        else reject(new Error(`HTTP ${xhr.status}`));
      };
      xhr.onerror = () => reject(new Error('فشل الاتصال - تحقق من IP / CORS أو قم بتفعيل CORS Unblock'));
      xhr.ontimeout = () => reject(new Error('انتهى الوقت: لا استجابة من الراوتر'));
      xhr.send();
    });
  }

  // طلب POST عبر XHR (application/x-www-form-urlencoded)
  function xhrPost(path, params, timeout = 8000) {
    return new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      const fullUrl = getRouterUrl() + path;
      xhr.open('POST', fullUrl, true);
      xhr.withCredentials = true;
      xhr.setRequestHeader('Authorization', getAuthHeader());
      xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
      xhr.timeout = timeout;
      const body = new URLSearchParams(params).toString();
      xhr.onload = function() {
        if (xhr.status === 401) reject(new Error('Unauthorized - فشل المصادقة'));
        else if (xhr.status >= 200 && xhr.status < 300) resolve(xhr.responseText);
        else reject(new Error(`POST فشل: ${xhr.status}`));
      };
      xhr.onerror = () => reject(new Error('POST شبكة فاشلة'));
      xhr.ontimeout = () => reject(new Error('POST مهلة'));
      xhr.send(body);
    });
  }

  // عرض رسائل منبثقة
  function showToast(msg, isError = false) {
    const toastEl = document.getElementById('toast');
    toastEl.textContent = msg;
    toastEl.style.background = isError ? '#b91c1c' : '#15803d';
    toastEl.style.display = 'block';
    if (toastEl._timer) clearTimeout(toastEl._timer);
    toastEl._timer = setTimeout(() => toastEl.style.display = 'none', 4000);
  }

  function setHtml(id, content) {
    document.getElementById(id).innerHTML = content;
  }

  // --------------------------------------------------------------
  // بيانات عامة
  let devicesList = [];      // { mac, ip, name, blocked }
  let blockedMacs = [];     // { mac, desc }

  // --------------------------------------------------------------
  // 1. اختبار الاتصال الأساسي
  // --------------------------------------------------------------
  async function testConnection() {
    setHtml('conn-status', '<span style="color:#888;">🔄 جاري اختبار الاتصال...</span>');
    try {
      const html = await xhrGet('/', 5000);
      if (html && (html.includes('Edimax') || html.includes('login') || html.includes('admin'))) {
        setHtml('conn-status', '<div class="msg ok">✅ الاتصال بالراوتر ناجح - صفحة الويب تستجيب</div>');
        showToast('اتصال ناجح بالراوتر');
      } else {
        setHtml('conn-status', '<div class="msg ok">✅ تم الرد من الراوتر (استجابة غير متوقعة لكن اتصال يعمل)</div>');
      }
    } catch (err) {
      let errMsg = err.message;
      if (errMsg.includes('Failed to fetch') || errMsg.includes('فشل الاتصال')) {
        errMsg = '❌ فشل CORS أو الراوتر لا يستجيب. تأكد من:<br>• تفعيل إضافة CORS Unblock في Kiwi.<br>• وضع https://2ed-code.github.io في Access-Control-Allow-Origin (مع Credentials).<br>• Scope: 192.168.1.185';
      }
      setHtml('conn-status', `<div class="msg err">❌ خطأ: ${errMsg}</div>`);
      showToast(err.message, true);
    }
  }

  // --------------------------------------------------------------
  // 2. جلب الأجهزة المتصلة (محاولة عدة endpoints + استخراج MAC/IP)
  // --------------------------------------------------------------
  async function fetchDevices() {
    setHtml('dev-list', '<span>🔄 جلب الأجهزة...</span>');
    let responseText = null;
    const endpoints = [
      '/goform/GetClientList',
      '/goform/formDhcpLease',
      '/Wireless_Basic.asp',
      '/dhcpd_leases.asp',
      '/client_list.asp',
      '/status_wan.asp'
    ];
    for (let ep of endpoints) {
      try {
        const txt = await xhrGet(ep, 4000);
        if (txt && txt.length > 50) {
          responseText = txt;
          break;
        }
      } catch (e) { /* جرب التالي */ }
    }
    if (!responseText) {
      setHtml('dev-list', '<div class="msg err">❌ لم نتمكن من جلب قائمة الأجهزة. تأكد من صلاحية الدخول أو أن الراوتر يدعم هذه الصفحات.</div>');
      return;
    }

    // استخراج الأجهزة
    let parsedDevices = [];
    // محاولة JSON أولاً
    try {
      const json = JSON.parse(responseText);
      let arr = json.clientList || json.list || json.devices || (Array.isArray(json) ? json : []);
      if (arr.length) {
        parsedDevices = arr.map(d => ({
          mac: (d.mac || d.MAC || '').toUpperCase(),
          ip: d.ip || d.IP || '?',
          name: d.name || d.hostname || d.HostName || 'جهاز'
        })).filter(d => d.mac && d.mac.length > 10);
      }
    } catch(e) { /* ليس json */ }

    // إذا لم نجد، نستخدم regex شامل من HTML
    if (parsedDevices.length === 0) {
      const macRegex = /([0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2}/g;
      const ipRegex = /\b(?:192\.168\.\d{1,3}\.\d{1,3}|10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(?:1[6-9]|2[0-9]|3[0-1])\.\d{1,3}\.\d{1,3})\b/g;
      const allMacs = [...new Set((responseText.match(macRegex) || []).map(m => m.toUpperCase()))];
      const allIps = [...new Set(responseText.match(ipRegex) || [])];
      if (allMacs.length) {
        parsedDevices = allMacs.map((mac, idx) => ({
          mac: mac,
          ip: allIps[idx] || '?',
          name: `جهاز ${idx+1}`
        }));
      }
    }

    if (parsedDevices.length === 0) {
      setHtml('dev-list', '<div class="msg inf">⚠️ لم يتم العثور على أجهزة في الرد. قد يكون الراوتر لا يظهر قائمة الأجهزة عبر هذه المسارات.</div>');
      return;
    }

    // دمج مع قائمة المحظورين الحالية
    devicesList = parsedDevices.map(d => ({
      ...d,
      blocked: blockedMacs.some(b => b.mac === d.mac)
    }));
    renderDevicesTable();
    showToast(`تم العثور على ${devicesList.length} جهاز متصل`, false);
  }

  function renderDevicesTable() {
    if (!devicesList.length) {
      setHtml('dev-list', '<div class="msg inf">لا توجد أجهزة متصلة معروضة</div>');
      return;
    }
    let html = `<table><thead><tr><th>الجهاز</th><th>IP</th><th>MAC</th><th>الحالة</th><th></th></tr></thead><tbody>`;
    for (let d of devicesList) {
      const blockedClass = d.blocked ? 'off' : 'on';
      const blockedText = d.blocked ? '🚫 محظور' : '✅ متصل';
      html += `<tr>
        <td>${escapeHtml(d.name)}</td>
        <td>${escapeHtml(d.ip)}</td>
        <td><span class="mac">${escapeHtml(d.mac)}</span></td>
        <td class="${blockedClass}">${blockedText}</td>
        <td><button onclick="toggleBlockDevice('${d.mac}')">${d.blocked ? 'رفع الحظر' : 'حظر'}</button></td>
      </tr>`;
    }
    html += '</tbody></table>';
    setHtml('dev-list', html);
  }

  // --------------------------------------------------------------
  // 3. وظائف الحظر ورفع الحظر (باستخدام goform/formAccept)
  // --------------------------------------------------------------
  async function blockMacAddress() {
    let mac = document.getElementById('blk-mac').value.trim().toUpperCase();
    if (!mac.match(/^([0-9A-F]{2}[:-]){5}[0-9A-F]{2}$/)) {
      showToast('صيغة MAC غير صحيحة (مثال: AA:BB:CC:DD:EE:FF)', true);
      return;
    }
    if (blockedMacs.some(b => b.mac === mac)) {
      showToast('هذا الجهاز محظور بالفعل', true);
      return;
    }
    const desc = document.getElementById('blk-desc').value.trim() || 'محظور يدوياً';
    try {
      await xhrPost('/goform/formAccept', {
        mac_addr: mac,
        filter_type: '1',
        'submit-url': '/Accept_Control.asp'
      });
      blockedMacs.push({ mac, desc });
      // تحديث حالة الجهاز في القائمة إذا موجود
      const dev = devicesList.find(d => d.mac === mac);
      if (dev) dev.blocked = true;
      renderDevicesTable();
      renderBlacklistPanel();
      showToast(`🚫 تم حظر ${mac}`);
      document.getElementById('blk-mac').value = '';
      document.getElementById('blk-desc').value = '';
    } catch(e) {
      showToast(`فشل الحظر: ${e.message}`, true);
    }
  }

  async function unblockDevice(mac) {
    try {
      await xhrPost('/goform/formAccept', {
        mac_addr: mac,
        filter_type: '0',
        'submit-url': '/Accept_Control.asp'
      });
      blockedMacs = blockedMacs.filter(b => b.mac !== mac);
      const dev = devicesList.find(d => d.mac === mac);
      if (dev) dev.blocked = false;
      renderDevicesTable();
      renderBlacklistPanel();
      showToast(`✅ رفع الحظر عن ${mac}`);
    } catch(e) {
      showToast(`فشل رفع الحظر: ${e.message}`, true);
    }
  }

  async function toggleBlockDevice(mac) {
    if (blockedMacs.some(b => b.mac === mac)) {
      await unblockDevice(mac);
    } else {
      // إضافة إلى القائمة السوداء محلياً ثم إرسال الطلب
      if (!blockedMacs.some(b => b.mac === mac)) {
        blockedMacs.push({ mac, desc: 'محظور من الجدول' });
      }
      try {
        await xhrPost('/goform/formAccept', {
          mac_addr: mac,
          filter_type: '1',
          'submit-url': '/Accept_Control.asp'
        });
        const dev = devicesList.find(d => d.mac === mac);
        if (dev) dev.blocked = true;
        renderDevicesTable();
        renderBlacklistPanel();
        showToast(`🚫 تم حظر ${mac}`);
      } catch(e) {
        // إعادة إزالة من القائمة المحلية في حال الفشل
        blockedMacs = blockedMacs.filter(b => b.mac !== mac);
        showToast(`فشل الحظر: ${e.message}`, true);
      }
    }
  }

  function renderBlacklistPanel() {
    const container = document.getElementById('blacklist');
    if (!blockedMacs.length) {
      container.innerHTML = '<div style="color:#888;font-size:13px;margin-top:8px;">لا توجد أجهزة محظورة</div>';
      return;
    }
    let html = '';
    for (let b of blockedMacs) {
      html += `<div class="mac-item">
        <div><span class="mac">${escapeHtml(b.mac)}</span> — ${escapeHtml(b.desc)}</div>
        <button onclick="unblockDevice('${b.mac}')">✖ إزالة</button>
      </div>`;
    }
    container.innerHTML = html;
  }

  // --------------------------------------------------------------
  // 4. وظائف الإعدادات (WiFi، SSID hidden، تغيير user، QoS)
  // --------------------------------------------------------------
  async function changeWifiPassword() {
    const newPwd = document.getElementById('wifipwd').value;
    if (newPwd.length < 8) {
      showToast('كلمة المرور يجب أن تكون 8 أحرف على الأقل', true);
      return;
    }
    try {
      await xhrPost('/goform/formWlbasic', { wpa_psk: newPwd, 'submit-url': '/wireless_basic.asp' });
      showToast('✅ تم تغيير كلمة مرور WiFi بنجاح');
      document.getElementById('wifipwd').value = '';
    } catch(e) {
      showToast(`خطأ: ${e.message}`, true);
    }
  }

  async function setSsidVisibility() {
    const val = document.getElementById('ssid-vis').value; // '0' مرئية, '1' مخفية
    try {
      await xhrPost('/goform/formWlbasic', { hide_ssid: val, 'submit-url': '/wireless_basic.asp' });
      showToast(val === '1' ? '🙈 الشبكة أصبحت مخفية' : '👁 الشبكة مرئية الآن');
    } catch(e) {
      showToast(`فشل تغيير إخفاء SSID: ${e.message}`, true);
    }
  }

  async function changeAdminUser() {
    const newUser = document.getElementById('newuser').value.trim();
    if (!newUser) {
      showToast('يرجى إدخال اسم مستخدم جديد', true);
      return;
    }
    try {
      await xhrPost('/goform/formPassword', { http_username: newUser, 'submit-url': '/password.asp' });
      document.getElementById('ruser').value = newUser;
      showToast(`✅ تم تغيير اسم المستخدم إلى ${newUser}`);
      document.getElementById('newuser').value = '';
    } catch(e) {
      showToast(`فشل تغيير المستخدم: ${e.message}`, true);
    }
  }

  async function setQosRate() {
    const mac = document.getElementById('qmac').value.trim();
    if (!mac) {
      showToast('أدخل MAC الجهاز', true);
      return;
    }
    const down = document.getElementById('qdl').value || '0';
    const up = document.getElementById('qul').value || '0';
    try {
      await xhrPost('/goform/formQoS', { mac, down_limit: down, up_limit: up, 'submit-url': '/QoS_Rate.html' });
      showToast(`⚡ تم ضبط تحميل ${down} / رفع ${up} Mbps للجهاز ${mac}`);
    } catch(e) {
      showToast(`فشل QoS: ${e.message}`, true);
    }
  }

  // --------------------------------------------------------------
  // 5. الدخول الكامل + جلب الأجهزة وقائمة الحظر
  // --------------------------------------------------------------
  async function fullLoginAndFetch() {
    await testConnection();
    await fetchDevices();
    // محاولة جلب قائمة المحظورين من الراوتر (اختياري)
    try {
      const filterPage = await xhrGet('/Accept_Control.asp', 3000);
      const macRegexBlk = /([0-9A-Fa-f]{2}[:-]){5}[0-9A-Fa-f]{2}/g;
      const blockedFromPage = [...new Set((filterPage.match(macRegexBlk) || []).map(m => m.toUpperCase()))];
      if (blockedFromPage.length) {
        for (let m of blockedFromPage) {
          if (!blockedMacs.some(b => b.mac === m)) {
            blockedMacs.push({ mac: m, desc: 'من قائمة الراوتر' });
          }
        }
        // تحديث حالة الأجهزة
        devicesList.forEach(d => { d.blocked = blockedMacs.some(b => b.mac === d.mac); });
        renderDevicesTable();
      }
    } catch(e) { /* لا توجد قائمة محظورين */ }
    renderBlacklistPanel();
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
